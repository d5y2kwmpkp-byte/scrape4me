name: Scrape Dominos

on:
  workflow_dispatch:
    inputs:
      location:
        description: 'Location to search (e.g. Chicago, IL)'
        required: true
        default: 'New York, NY'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

            - name: Install dependencies
        run: npm install playwright playwright-core


      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: node scripts/scrape.js "${{ github.event.inputs.location }}"

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/locations.json
          git diff --staged --quiet || git commit -m "scrape: ${{ github.event.inputs.location }}"
          git push
