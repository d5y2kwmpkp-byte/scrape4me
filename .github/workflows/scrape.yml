name: Scrape Dominos

on:
 workflow_dispatch:
   inputs:
     location:
       description: 'Location (e.g. Chicago, IL)'
       required: true
       default: 'New York, NY'
     business_type:
       description: 'What to search (e.g. general contractors)'
       required: true
       default: 'Dominos Pizza'

jobs:
 scrape:
   runs-on: ubuntu-latest
   permissions:
     contents: write

   steps:
     - name: Checkout repo
       uses: actions/checkout@v4

     - name: Setup Node
       uses: actions/setup-node@v4
       with:
         node-version: 20

     - name: Install playwright
       run: npm install playwright

     - name: Install Playwright browsers
       run: npx playwright install chromium --with-deps

     - name: Run scraper
       run: node scripts/scrape.js "${{ github.event.inputs.location }}" "${{ github.event.inputs.business_type }}"

     - name: Commit results
       run: |
         git config user.name "github-actions"
         git config user.email "actions@github.com"
         git add data/locations.json data/debug.png
         git diff --staged --quiet || git commit -m "scrape: ${{ github.event.inputs.business_type }} near ${{ github.event.inputs.location }}"
         git push
