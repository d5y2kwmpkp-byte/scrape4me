name: FlowState TABS Scraper

on:
  schedule:
    - cron: '0 6 * * *'   # 6am UTC daily
  workflow_dispatch:

jobs:
  flowstate-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Run FlowState TABS scraper
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: node api/tabs_scraper_flowstate.cjs
