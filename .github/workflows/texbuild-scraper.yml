name: TexBuild Scraper

on:
  workflow_dispatch:

jobs:
  texbuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Run TexBuild scraper
        env:
          TEXBUILD_SUPABASE_KEY: ${{ secrets.TEXBUILD_SUPABASE_KEY }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: node api/tabs_scraper_v3.cjs
